# Block aggressive and malicious bots at the Apache level
# This fires BEFORE PHP, saving DB connections and CPU

# === IP RANGE BLOCKS (requires mod_remoteip to see real client IPs) ===
# Persistent attackers identified via access log analysis.
<Location "/">
    <RequireAll>
        Require all granted
        # Alibaba Cloud scraper botnet — ~90% of traffic hitting Special:RecentChanges
        # with spoofed Chrome UAs (observed 2026-04-21). AliCloud AS37963.
        Require not ip 39.101.88.0/21
        # UCloud China — secondary scraper source
        Require not ip 106.75.0.0/16
        # Tencent Cloud (AS132203/AS45090) — heavy scraper load 2026-04-25
        # Spoofed Chrome UAs hammering Special:RecentChanges/diff endpoints
        Require not ip 43.128.0.0/11
        Require not ip 43.160.0.0/13
        Require not ip 43.172.0.0/14
        Require not ip 49.51.0.0/16
        # Facebook meta-webindexer IPv6 range — ignores 403s, keeps retrying
        # and saturating Apache. Block at IP level to stop CPU drain (2026-04-25).
        Require not ip 2a03:2880::/29
    </RequireAll>
</Location>

# === RecentChanges is PUBLIC again (2026-05-17) ===
# The previous blanket "deny all unauthenticated access to RecentChanges"
# rule (server-level RewriteRule + index.php <If> clauses) was removed:
# it 403'd every logged-out human, not just scrapers. The site is now
# Cloudflare-proxied (DNS resolves to CF), so botnet volume is absorbed by
# the Cloudflare edge cache + WAF and the Traefik per-IP rate-limit.
# Cloud scraper netblocks remain hard-blocked above; aggressive bot UAs
# remain blocked below. RewriteEngine is left on for any future rules.
RewriteEngine On

# Consolidated bot UA list (expanded 2026-04-18 to stop DB connection pool exhaustion)
# Includes: SEO spam, attack tools, aggressive AI crawlers hitting expensive endpoints
<Location "/">
    <If "%{HTTP_USER_AGENT} =~ /MJ12bot|AhrefsBot|SemrushBot|DotBot|BLEXBot|MegaIndex|Bytespider|PetalBot|Barkrowler|trendictionbot|IbouBot|Baiduspider|YandexBot|SeznamBot|DataForSeoBot|LinkupBot|SerpstatBot|SiteAuditBot|Expanse/i">
        Require all denied
    </If>
    # Block attack tools
    <If "%{HTTP_USER_AGENT} =~ /Nikto|sqlmap|Nmap|masscan|ZmEu/i">
        Require all denied
    </If>
    # Block empty user agents (vulnerability scanners)
    <If "-z %{HTTP_USER_AGENT}">
        Require all denied
    </If>
    # Block very old Chrome versions commonly faked by bots (Chrome 20-39)
    <If "%{HTTP_USER_AGENT} =~ m#Chrome/[23][0-9]\.#">
        Require all denied
    </If>
</Location>

# Block bots from expensive wiki operations (diffs, history, special pages)
# Handles BOTH URL styles: /index.php?action=X and /index.php?title=Special:X
<LocationMatch "^/index\.php">
    # Expensive actions from known bots
    <If "%{QUERY_STRING} =~ /action=(history|diff|raw|render|info|purge|edit|submit)/ && %{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|Amazonbot|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot|meta-externalagent|meta-webindexer|FacebookBot|SleepBot|facebookexternalhit|Applebot|Google-Extended|OAI-SearchBot/i">
        Require all denied
    </If>
    # oldid= and diff= are expensive revision lookups (known bots only)
    <If "%{QUERY_STRING} =~ /(oldid|diff)=[0-9]/ && %{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|Amazonbot|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot|meta-externalagent|meta-webindexer|FacebookBot|SleepBot|facebookexternalhit|Applebot|Google-Extended|OAI-SearchBot/i">
        Require all denied
    </If>
</LocationMatch>

# Pretty-URL Special: pages
<LocationMatch "^/(wiki/)?Special:">
    <If "%{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|Amazonbot|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot|meta-externalagent|meta-webindexer|FacebookBot|SleepBot|facebookexternalhit|Applebot|Google-Extended|OAI-SearchBot/i">
        Require all denied
    </If>
</LocationMatch>

# Block API access from crawlers (not meant for them)
<Location "/api.php">
    <If "%{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|Amazonbot|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot|meta-externalagent|meta-webindexer|FacebookBot|SleepBot|facebookexternalhit|Applebot|Google-Extended|OAI-SearchBot/i">
        Require all denied
    </If>
</Location>

# Block access to xmlrpc.php (frequently exploited)
<Files "xmlrpc.php">
    Require all denied
</Files>

# Block direct access to wp-config.php
<Files "wp-config.php">
    Require all denied
</Files>
