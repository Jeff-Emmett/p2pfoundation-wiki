# Block aggressive and malicious bots at the Apache level
# This fires BEFORE PHP, saving DB connections and CPU

# === IP RANGE BLOCKS (requires mod_remoteip to see real client IPs) ===
# Persistent attackers identified via access log analysis.
<Location "/">
    <RequireAll>
        Require all granted
        # Alibaba Cloud scraper botnet — ~90% of traffic hitting Special:RecentChanges
        # with spoofed Chrome UAs (observed 2026-04-21). AliCloud AS37963.
        Require not ip 39.101.88.0/21
        # UCloud China — secondary scraper source
        Require not ip 106.75.0.0/16
    </RequireAll>
</Location>

# === SERVER-LEVEL REWRITE: Block scraper botnet on RecentChanges ===
# Scraper botnets use spoofed Chrome UAs to hammer Special:RecentChanges.
# UA-based blocking is useless; block all unauthenticated access instead.
# Logged-in editors (with p2pwiki_session cookie) are allowed through.
RewriteEngine On
RewriteCond %{QUERY_STRING} title=Special(%3A|:)(RecentChanges|RecentChangesLinked) [NC]
RewriteCond %{HTTP_COOKIE} !p2pwiki_session
RewriteRule ^/index\.php$ - [F,L]

RewriteCond %{QUERY_STRING} feedrecentchanges [NC]
RewriteCond %{HTTP_COOKIE} !p2pwiki_session
RewriteRule ^/api\.php$ - [F,L]

# Consolidated bot UA list (expanded 2026-04-18 to stop DB connection pool exhaustion)
# Includes: SEO spam, attack tools, aggressive AI crawlers hitting expensive endpoints
<Location "/">
    <If "%{HTTP_USER_AGENT} =~ /MJ12bot|AhrefsBot|SemrushBot|DotBot|BLEXBot|MegaIndex|Bytespider|PetalBot|Barkrowler|trendictionbot|IbouBot|Baiduspider|YandexBot|SeznamBot|DataForSeoBot|LinkupBot|SerpstatBot|SiteAuditBot|Expanse/i">
        Require all denied
    </If>
    # Block attack tools
    <If "%{HTTP_USER_AGENT} =~ /Nikto|sqlmap|Nmap|masscan|ZmEu/i">
        Require all denied
    </If>
    # Block empty user agents (vulnerability scanners)
    <If "-z %{HTTP_USER_AGENT}">
        Require all denied
    </If>
    # Block very old Chrome versions commonly faked by bots (Chrome 20-39)
    <If "%{HTTP_USER_AGENT} =~ m#Chrome/[23][0-9]\.#">
        Require all denied
    </If>
</Location>

# Block bots from expensive wiki operations (diffs, history, special pages)
# Handles BOTH URL styles: /index.php?action=X and /index.php?title=Special:X
<LocationMatch "^/index\.php">
    # Block ALL unauthenticated access to RecentChanges/RecentChangesLinked
    # These are the most CPU-expensive pages and are targeted by scraper botnets
    # using spoofed Chrome UAs. Only logged-in editors (with session cookie) allowed.
    <If "%{QUERY_STRING} =~ /title=Special(%3A|:)(RecentChanges|RecentChangesLinked)/ && ! %{HTTP_COOKIE} =~ /p2pwiki_session/">
        Require all denied
    </If>
    # Block feedrecentchanges API for unauthenticated users
    <If "%{QUERY_STRING} =~ /feedrecentchanges/ && ! %{HTTP_COOKIE} =~ /p2pwiki_session/">
        Require all denied
    </If>
    # Expensive actions from known bots
    <If "%{QUERY_STRING} =~ /action=(history|diff|raw|render|info|purge|edit|submit)/ && %{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|Amazonbot|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot|meta-externalagent|FacebookBot|Applebot|Google-Extended|OAI-SearchBot/i">
        Require all denied
    </If>
    # oldid= and diff= are expensive revision lookups (known bots only)
    <If "%{QUERY_STRING} =~ /(oldid|diff)=[0-9]/ && %{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|Amazonbot|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot|meta-externalagent|FacebookBot|Applebot|Google-Extended|OAI-SearchBot/i">
        Require all denied
    </If>
</LocationMatch>

# Pretty-URL Special: pages
<LocationMatch "^/(wiki/)?Special:">
    <If "%{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|Amazonbot|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot|meta-externalagent|FacebookBot|Applebot|Google-Extended|OAI-SearchBot/i">
        Require all denied
    </If>
</LocationMatch>

# Block API access from crawlers (not meant for them)
<Location "/api.php">
    <If "%{HTTP_USER_AGENT} =~ /bot|crawl|spider|slurp|Amzn-Search|Amazonbot|ChatGPT-User|GPTBot|ClaudeBot|anthropic-ai|CCBot|meta-externalagent|FacebookBot|Applebot|Google-Extended|OAI-SearchBot/i">
        Require all denied
    </If>
</Location>

# Block access to xmlrpc.php (frequently exploited)
<Files "xmlrpc.php">
    Require all denied
</Files>

# Block direct access to wp-config.php
<Files "wp-config.php">
    Require all denied
</Files>
