# Static image caching + cache-correctness for /images
# Added 2026-06-06: a transient broken image load used to stick in a visitor's
# browser/CF edge for up to 4h (Cloudflare's default TTL, since origin sent no
# Cache-Control on images). This sets an explicit 1h TTL so any future bad state
# self-heals in ~1h, and drops the Vary:User-Agent header that Apache auto-adds
# because block-bots.conf evaluates User-Agent in <If> blocks.
#
# Requires mod_headers (enabled via the `command:` override in docker-compose.yml).
<LocationMatch "^/images/">
    <IfModule mod_headers.c>
        # Cache ONLY successful responses — never pin a 404/5xx, so a missing
        # image or a failed thumbnail render can't get cached as broken.
        Header set Cache-Control "public, max-age=3600" "expr=%{REQUEST_STATUS} == 200"
        # Drop Vary:User-Agent so shared caches store a single copy per image
        # instead of one per unique UA string. Image bytes never depend on UA.
        Header unset Vary
    </IfModule>
</LocationMatch>
