services:
  p2pwiki-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    container_name: p2pwiki-elasticsearch
    restart: unless-stopped
    mem_limit: 3G
    cpus: 2
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      xpack.security.enabled: "false"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - p2pwiki-es-data:/usr/share/elasticsearch/data
    networks:
      - p2pwiki-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  p2pwiki:
    depends_on:
      - p2pwiki-db
      - p2pwiki-elasticsearch

  p2pwiki-dumps:
    image: nginx:alpine
    container_name: p2pwiki-dumps
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    volumes:
      - ./dumps:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.p2pwiki-dumps.rule=Host(`wiki.p2pfoundation.net`) && PathPrefix(`/dumps`)
      - traefik.http.routers.p2pwiki-dumps.entrypoints=websecure
      - traefik.http.routers.p2pwiki-dumps.tls.certresolver=letsencrypt
      - traefik.http.routers.p2pwiki-dumps.priority=100
      - traefik.http.routers.p2pwiki-dumps.middlewares=p2pwiki-dumps-strip,p2pwiki-ratelimit
      - traefik.http.middlewares.p2pwiki-dumps-strip.stripprefix.prefixes=/dumps
      - traefik.http.services.p2pwiki-dumps.loadbalancer.server.port=80
    networks:
      - traefik-public
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

volumes:
  p2pwiki-es-data:

networks:
  p2pwiki-internal:
  traefik-public:
    external: true
