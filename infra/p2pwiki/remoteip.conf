# Load mod_remoteip (not enabled by default in mediawiki:1.40 Debian image)
LoadModule remoteip_module /usr/lib/apache2/modules/mod_remoteip.so

# Traefik sets X-Real-Ip to the real client IP (single value, set by trusted proxy).
# Trust only docker internal networks as the source of this header.
RemoteIPHeader Cf-Connecting-Ip
RemoteIPTrustedProxy 172.16.0.0/12
RemoteIPTrustedProxy 10.0.0.0/8
RemoteIPTrustedProxy 127.0.0.1/32

# LogFormat: %a = real client IP after mod_remoteip substitution
LogFormat "%a %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
